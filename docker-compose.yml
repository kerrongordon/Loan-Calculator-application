services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loan-calculator-app
    restart: unless-stopped
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "echo '[app] installing dependencies...' &&
      npm install &&
      echo '[app] starting nuxt dev server...' &&
      npm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  node_modules:
